<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mi Migración">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%235b5ef4'/%3E%3Ctext x='50' y='67' font-size='50' text-anchor='middle' fill='white'%3E💰%3C/text%3E%3C/svg%3E">
    <link rel="manifest" href="manifest.json">
    <title>Sistema Financiero Migratorio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <div class="status-bar">
            <span></span>
        </div>

        <div class="content" id="dashboard-content">
            <div class="loading">
                <div class="spinner"></div>
                <p>Cargando tu viaje financiero...</p>
            </div>
        </div>

        <div class="tab-bar">
            <div class="tab active" data-tab="dashboard">
                <div class="tab-icon">📊</div>
                <div class="tab-lbl">panel</div>
            </div>
            <div class="tab" data-tab="transacciones">
                <div class="tab-icon">📜</div>
                <div class="tab-lbl">historial</div>
            </div>
            <div class="tab" data-tab="cdt">
                <div class="tab-icon">🏦</div>
                <div class="tab-lbl">cdt</div>
            </div>
            <div class="tab" data-tab="config">
                <div class="tab-icon">⚙️</div>
                <div class="tab-lbl">config</div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3 id="modal-title">Registrar Ingreso</h3>
            <form id="transaction-form">
                <input type="number" id="monto" placeholder="Monto en COP" required>
                <select id="bolsillo" style="display: none;">
                    <option value="migracion">Migración</option>
                    <option value="vida_diaria">Vida Diaria</option>
                    <option value="liquidez">Liquidez</option>
                    <option value="disfrute">Disfrute</option>
                </select>
                <input type="text" id="descripcion" placeholder="Descripción (opcional)">
                <button type="submit">Guardar</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
